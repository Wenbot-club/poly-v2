name: local_stack

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  local_stack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package and pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: Run local stack tests
        run: |
          pytest tests
