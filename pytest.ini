from __future__ import annotations

from dataclasses import dataclass
from typing import Any, Dict, Iterable

from .settings import RuntimeConfig
from .state import register_binance_tick, register_chainlink_tick
from .types import LocalState, PriceTick


@dataclass(slots=True)
class RTDSMessage:
    source: str
    symbol: str
    timestamp_ms: int
    recv_timestamp_ms: int
    value: float
    sequence_no: int


@dataclass
class RTDSMessageRouter:
    config: RuntimeConfig

    def apply(self, state: LocalState, message: Dict[str, Any]) -> None:
        parsed = self._parse_message(message)
        state.set_clock(parsed.recv_timestamp_ms)
        if parsed.source == "chainlink":
            register_chainlink_tick(state, self._to_tick(parsed))
        elif parsed.source == "binance":
            register_binance_tick(state, self._to_tick(parsed), self.config)
        else:
            raise ValueError(f"unsupported RTDS source: {parsed.source!r}")

    def _parse_message(self, message: Dict[str, Any]) -> RTDSMessage:
        required = ["source", "symbol", "timestamp_ms", "recv_timestamp_ms", "value", "sequence_no"]
        missing = [key for key in required if key not in message]
        if missing:
            raise ValueError(f"missing RTDS fields: {missing}")

        source = str(message["source"]).lower()
        if source not in {"chainlink", "binance"}:
            raise ValueError(f"unsupported RTDS source: {source!r}")

        symbol = str(message["symbol"])
        timestamp_ms = int(message["timestamp_ms"])
        recv_timestamp_ms = int(message["recv_timestamp_ms"])
        value = float(message["value"])
        sequence_no = int(message["sequence_no"])

        if recv_timestamp_ms < timestamp_ms:
            raise ValueError(
                f"recv_timestamp_ms must be >= timestamp_ms, got recv_timestamp_ms={recv_timestamp_ms} timestamp_ms={timestamp_ms}"
            )
        if sequence_no < 0:
            raise ValueError(f"sequence_no must be >= 0, got {sequence_no}")

        return RTDSMessage(
            source=source,
            symbol=symbol,
            timestamp_ms=timestamp_ms,
            recv_timestamp_ms=recv_timestamp_ms,
            value=value,
            sequence_no=sequence_no,
        )

    @staticmethod
    def _to_tick(message: RTDSMessage) -> PriceTick:
        return PriceTick(
            symbol=message.symbol,
            timestamp_ms=message.timestamp_ms,
            recv_timestamp_ms=message.recv_timestamp_ms,
            value=message.value,
            sequence_no=message.sequence_no,
        )


@dataclass
class MockRTDSStream:
    messages: Iterable[Dict[str, Any]]
    stop_on_error: bool = True

    def run(self, state: LocalState, config: RuntimeConfig) -> None:
        router = RTDSMessageRouter(config)
        for idx, msg in enumerate(self.messages, start=1):
            try:
                router.apply(state, msg)
            except Exception as exc:
                state.log(
                    "ERROR",
                    "rtds_message_failed",
                    ts_ms=state.simulated_now_ms,
                    index=idx,
                    error=str(exc),
                    raw=msg,
                )
                if self.stop_on_error:
                    raise


def summarize_rtds_state(state: LocalState) -> dict:
    return {
        "chainlink_count": len(state.chainlink_ticks),
        "binance_count": len(state.binance_ticks),
        "last_chainlink": None
        if state.last_chainlink is None
        else {
            "symbol": state.last_chainlink.symbol,
            "timestamp_ms": state.last_chainlink.timestamp_ms,
            "recv_timestamp_ms": state.last_chainlink.recv_timestamp_ms,
            "value": state.last_chainlink.value,
            "sequence_no": state.last_chainlink.sequence_no,
        },
        "last_binance": None
        if state.last_binance is None
        else {
            "symbol": state.last_binance.symbol,
            "timestamp_ms": state.last_binance.timestamp_ms,
            "recv_timestamp_ms": state.last_binance.recv_timestamp_ms,
            "value": state.last_binance.value,
            "sequence_no": state.last_binance.sequence_no,
        },
        "tape_ewma": round(state.tape_ewma, 6),
    }
